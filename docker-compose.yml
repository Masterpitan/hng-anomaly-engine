services:
  nextcloud:
    image: kefaslungu/hng-nextcloud
    restart: always
    expose:
      - "80"
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
    networks:
      - hng-net

  nginx-proxy:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud
    restart: always
    networks:
      - hng-net

  detector:
    build: ./detector
    network_mode: "host"
    cap_add:
      - NET_ADMIN
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
      - ./detector/config.yaml:/app/config.yaml:ro
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    restart: always
    depends_on:
      - nginx-proxy

volumes:
  HNG-nginx-logs:

networks:
  hng-net:
    driver: bridge
